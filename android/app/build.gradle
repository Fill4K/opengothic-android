plugins {
    id 'com.android.application'
}

android {
    namespace 'org.opengothic.gothic'
    compileSdk 34

    defaultConfig {
        applicationId "org.opengothic.gothic"
        minSdk 29
        targetSdk 34
        versionCode 18
        versionName "1.8-v18"

        ndk {
            abiFilters 'arm64-v8a'
        }

        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_static',
                          '-DANDROID_PLATFORM=android-29'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file('../../CMakeLists.txt')
            version '3.22.1'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            // debug signing is fine for sideloading
            signingConfig signingConfigs.debug
        }
        debug {
            jniDebuggable true
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}
