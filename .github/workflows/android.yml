name: Android

on:
  push:
  workflow_dispatch:

jobs:
  apk:
    name: Build APK (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install shader compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools ninja-build
          glslangValidator --version

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        run: gradle -p android assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenGothic-Android
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
